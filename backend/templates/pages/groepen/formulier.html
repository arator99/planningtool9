{% extends "layouts/app.html" %}
{% set actief_menu = "beheer" %}

{% block titel %}Nieuwe groep — Planning Tool{% endblock %}

{% block inhoud %}
<div class="flex items-center gap-4 mb-6">
    <a href="/groepen" class="text-sm" style="color: var(--tekst-secundair);">← Groepen</a>
    <h1 class="text-2xl font-bold" style="color: var(--tekst);">Nieuwe groep</h1>
</div>

<div class="max-w-lg rounded-xl border p-6" style="border-color: var(--rand); background: var(--achtergrond-widget);">
    <form method="post" action="/groepen">
        <input type="hidden" name="csrf_token" value="{{ csrf_token }}">

        <div class="mb-4">
            <label class="block text-sm font-medium mb-1" style="color: var(--tekst);">Naam</label>
            <input type="text" name="naam" required maxlength="100"
                   class="w-full text-sm rounded-lg border px-3 py-2 outline-none"
                   style="border-color: var(--rand); background: var(--achtergrond); color: var(--tekst);">
        </div>

        <div class="mb-4">
            <label class="block text-sm font-medium mb-1" style="color: var(--tekst);">Code <span class="font-normal text-xs" style="color: var(--tekst-secundair);">(bijv. GRP1)</span></label>
            <input type="text" name="code" required maxlength="20"
                   class="w-full text-sm rounded-lg border px-3 py-2 outline-none font-mono uppercase"
                   style="border-color: var(--rand); background: var(--achtergrond); color: var(--tekst);">
        </div>

        <div class="mb-6">
            <label class="block text-sm font-medium mb-1" style="color: var(--tekst);">Beschrijving <span class="font-normal text-xs" style="color: var(--tekst-secundair);">(optioneel)</span></label>
            <input type="text" name="beschrijving" maxlength="255"
                   class="w-full text-sm rounded-lg border px-3 py-2 outline-none"
                   style="border-color: var(--rand); background: var(--achtergrond); color: var(--tekst);">
        </div>

        <div class="flex gap-3">
            <button type="submit"
                    class="text-sm font-medium text-white px-5 py-2 rounded-lg"
                    style="background: var(--primair);"
                    onmouseover="this.style.background='var(--primair-hover)'"
                    onmouseout="this.style.background='var(--primair)'">
                Aanmaken
            </button>
            <a href="/groepen" class="text-sm px-5 py-2 rounded-lg border"
               style="border-color: var(--rand); color: var(--tekst-secundair);">
                Annuleren
            </a>
        </div>
    </form>
</div>
{% endblock %}
