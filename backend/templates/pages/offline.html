<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Geen verbinding — Planning Tool</title>
    <style>
        :root {
            --primair: #2563eb;
            --achtergrond: #f1f5f9;
            --tekst: #0f172a;
            --tekst-secundair: #64748b;
            --rand: #e2e8f0;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: var(--achtergrond);
            color: var(--tekst);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }
        .kaart {
            background: white;
            border: 1px solid var(--rand);
            border-radius: 1rem;
            padding: 3rem 2.5rem;
            text-align: center;
            max-width: 400px;
            width: 100%;
            box-shadow: 0 4px 24px rgba(0,0,0,.06);
        }
        .icoon {
            width: 56px;
            height: 56px;
            margin: 0 auto 1.5rem;
            color: var(--tekst-secundair);
        }
        h1 { font-size: 1.25rem; font-weight: 700; margin-bottom: .5rem; }
        p  { font-size: .9rem; color: var(--tekst-secundair); line-height: 1.6; margin-bottom: 1.5rem; }
        .knop {
            display: inline-block;
            background: var(--primair);
            color: white;
            padding: .6rem 1.5rem;
            border-radius: .5rem;
            font-size: .9rem;
            font-weight: 600;
            text-decoration: none;
            cursor: pointer;
            border: none;
        }
    </style>
</head>
<body>
    <div class="kaart">
        <svg class="icoon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                  d="M3.055 11H5a2 2 0 012 2v1a2 2 0 002 2 2 2 0 012 2v2.945M8 3.935V5.5A2.5 2.5 0 0010.5 8h.5a2 2 0 012 2 2 2 0 104 0 2 2 0 012-2h.5A2.5 2.5 0 0021.5 5.5V3.935"/>
        </svg>
        <h1>Geen verbinding</h1>
        <p>
            Je bent momenteel offline.<br>
            Controleer je internetverbinding en probeer opnieuw.
        </p>
        <button class="knop" onclick="window.location.reload()">
            Opnieuw proberen
        </button>
    </div>
</body>
</html>
