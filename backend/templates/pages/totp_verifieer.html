{% extends "base.html" %}

{% block titel %}2FA verificatie — Planning Tool{% endblock %}

{% block inhoud %}
<div class="min-h-screen flex items-center justify-center bg-achtergrond">
    <div class="bg-oppervlak rounded-2xl shadow-lg p-8 w-full max-w-sm">

        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-14 h-14 bg-blue-600 rounded-xl mb-4">
                <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                          d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>
                </svg>
            </div>
            <h1 class="text-2xl font-bold text-tekst">Verificatie</h1>
            <p class="text-tekst-zacht text-sm mt-1">Voer de code in uit uw authenticator app</p>
        </div>

        {% if fout %}
        <div class="bg-red-50 border border-red-200 text-red-700 rounded-lg px-4 py-3 mb-6 text-sm">
            {{ fout }}
        </div>
        {% endif %}

        <form method="post" action="/auth/totp/verifieer" class="space-y-5">
            <div>
                <label for="code" class="block text-sm font-medium text-tekst mb-1">
                    Authenticatiecode
                </label>
                <input
                    type="text"
                    id="code"
                    name="code"
                    required
                    autofocus
                    autocomplete="one-time-code"
                    inputmode="numeric"
                    pattern="[0-9]{6}"
                    maxlength="6"
                    class="w-full border border-rand rounded-lg px-3 py-2.5 text-sm text-center
                           tracking-widest text-lg font-mono
                           focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                    placeholder="000000"
                >
                <p class="text-xs text-tekst-zacht mt-1 text-center">6-cijferige code, geldig 30 seconden</p>
            </div>
            <button
                type="submit"
                class="w-full bg-primair hover:bg-primair-hover text-white font-medium
                       rounded-lg py-2.5 text-sm transition-colors duration-150"
            >
                Verifiëren
            </button>
        </form>

        <div class="mt-4 text-center">
            <a href="/login" class="text-xs text-tekst-zacht hover:text-tekst">Terug naar inloggen</a>
        </div>

    </div>
</div>
{% endblock %}
