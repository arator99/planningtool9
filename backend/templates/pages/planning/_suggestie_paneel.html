<!-- HTMX fragment: suggestie paneel voor één cel -->
<div class="p-3">
    {% if suggesties %}
    <p class="text-xs font-medium text-tekst-zacht mb-2">
        {{ t("planning.suggestie") }} — <span class="text-tekst-zacht">{{ datum_str }}</span>
    </p>
    <div class="flex flex-wrap gap-1.5">
        {% for s in suggesties %}
        <button
            onclick="pasCodeToe('{{ s.shiftcode }}')"
            title="{{ t('planning.score') }}: {{ '%.0f'|format(s.score) }}{% if s.redenen %} · {{ s.redenen | join(', ') }}{% endif %}"
            class="text-xs font-semibold px-2.5 py-1 rounded border transition-colors
                   {% if s.score >= 65 %}bg-info-zacht border-info text-info hover:bg-info-zacht
                   {% elif s.score >= 50 %}bg-achtergrond border-rand text-tekst hover:bg-oppervlak
                   {% else %}bg-achtergrond border-rand text-tekst-zacht hover:bg-oppervlak{% endif %}">
            {{ s.shiftcode }}
            <span class="font-normal opacity-60 ml-0.5">{{ '%.0f'|format(s.score) }}</span>
        </button>
        {% endfor %}
    </div>
    {% else %}
    <p class="text-xs text-tekst-zacht">{{ t("planning.geen_kandidaten") }}</p>
    {% endif %}
</div>
