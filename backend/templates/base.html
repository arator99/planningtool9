<!DOCTYPE html>
<html lang="{{ huidige_taal | default('nl') }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block titel %}Planningtool{% endblock %}</title>

    {# ── Theme-init: zet dark-class VOOR Tailwind laadt om flash te voorkomen ── #}
    <script nonce="{{ csp_nonce() }}">
        (function () {
            var voorkeur = "{{ (huidige_gebruiker.thema if huidige_gebruiker is defined and huidige_gebruiker else 'systeem') }}";
            if (voorkeur === 'dark' ||
                (voorkeur === 'systeem' && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
                document.documentElement.classList.add('dark');
            }
        })();
    </script>

    {# ── Statisch gegenereerde CSS (Tailwind CLI + CSS variabelen) ── #}
    <link rel="stylesheet" href="/static/css/output.css">

    {# ── HTMX ── #}
    <script src="https://unpkg.com/htmx.org@1.9.12" defer></script>

    {% block extra_head %}{% endblock %}
</head>
<body class="bg-achtergrond text-tekst min-h-screen transition-colors duration-200">
    {% block inhoud %}{% endblock %}
</body>
</html>
