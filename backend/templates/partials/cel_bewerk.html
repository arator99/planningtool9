<td id="cel-{{ cel_gebruiker_id }}-{{ datum }}"
    class="border-2 border-primair bg-info-zacht p-1 min-w-[48px] align-top">
    <form hx-post="/planning/cel/{{ cel_gebruiker_id }}/{{ datum }}"
          hx-target="#cel-{{ cel_gebruiker_id }}-{{ datum }}"
          hx-swap="outerHTML"
          class="flex flex-col gap-1">

        <!-- Snelknoppen voor bekende shiftcodes -->
        {% if shiftcodes %}
        <div class="flex flex-wrap gap-0.5 mb-1">
            {% for sc in shiftcodes %}
            <button type="submit" name="shift_code" value="{{ sc.code }}"
                    class="text-xs px-1.5 py-0.5 rounded font-medium
                           {% if sc.code == huidige_code %}bg-primair text-white
                           {% else %}bg-oppervlak border border-rand text-tekst hover:bg-achtergrond{% endif %}">
                {{ sc.code }}
            </button>
            {% endfor %}
            <button type="submit" name="shift_code" value=""
                    class="text-xs px-1.5 py-0.5 rounded font-medium bg-gevaar-zacht border border-gevaar text-gevaar hover:bg-gevaar-zacht"
                    title="Wis cel">✕</button>
        </div>
        {% endif %}

        <!-- Vrij invoerveld -->
        <div class="flex gap-1">
            <input type="text" name="shift_code"
                   value="{{ huidige_code or '' }}"
                   maxlength="10"
                   class="w-16 text-xs border border-rand rounded px-1 py-0.5 uppercase
                          focus:outline-none focus:ring-1 focus:ring-primair"
                   placeholder="code"
                   autofocus>
            <button type="submit"
                    class="text-xs px-1.5 py-0.5 bg-primair text-white rounded hover:bg-primair-hover">✓</button>
        </div>

        <!-- Annuleer -->
        <button type="button"
                hx-get="/planning/cel/{{ cel_gebruiker_id }}/{{ datum }}/annuleer"
                hx-target="#cel-{{ cel_gebruiker_id }}-{{ datum }}"
                hx-swap="outerHTML"
                class="text-xs text-tekst-zacht hover:text-tekst text-left">annuleer</button>
    </form>
</td>
